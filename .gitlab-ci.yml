# GitLab CI/CD Pipeline for otel-journal-gatewayd-forwarder
#
# Stages:
#   1. lint     - Code formatting and linting
#   2. test     - Unit tests
#   3. e2e      - End-to-end tests (parallel across distros)
#   4. build    - Build release binary
#   5. release  - Upload artifacts to GitLab and GitHub

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  RUSTFLAGS: "-D warnings"
  BINARY_NAME: otel-journal-gatewayd-forwarder
  # E2E test settings
  E2E_IMAGE_PREFIX: otel-journal-e2e
  E2E_RESULTS: .e2e-results

stages:
  - lint
  - test
  - e2e
  - build
  - release

# Cache Cargo dependencies between jobs
.rust-cache: &rust-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}-rust
    paths:
      - .cargo/
      - target/

# Base Rust image
.rust-base: &rust-base
  image: rust:1.96.1-bookworm
  <<: *rust-cache

# =============================================================================
# LINT STAGE
# =============================================================================

fmt:
  stage: lint
  <<: *rust-base
  script:
    - cargo fmt --check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

clippy:
  stage: lint
  <<: *rust-base
  script:
    - cargo clippy --all-targets --all-features -- -D warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

audit:
  stage: lint
  <<: *rust-base
  script:
    - cargo install cargo-audit --locked
    - cargo audit
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# =============================================================================
# TEST STAGE
# =============================================================================

unit-test:
  stage: test
  <<: *rust-base
  script:
    - cargo test --all-features
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/junit.xml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# =============================================================================
# E2E TESTS (Parallel Matrix)
# =============================================================================

.e2e-base: &e2e-base
  stage: e2e
  image: quay.io/podman/stable:latest
  # Untagged on purpose: aether gitlab-runner-k8s runs untagged jobs with
  # executor privileged=true (nested podman --privileged / systemd). The old
  # instance runner tagged `privileged` is stale; do not reintroduce that tag
  # unless a live runner advertises it again.
  variables:
    STORAGE_DRIVER: vfs
  before_script:
    - podman info
    - mkdir -p ${E2E_RESULTS}/${DISTRO}
  script:
    - |
      echo "Building e2e container for ${DISTRO}..."
      podman build -f e2e/Containerfile \
        --build-arg DISTRO=${DISTRO} \
        -t ${E2E_IMAGE_PREFIX}-${DISTRO} .
    - |
      echo "Running e2e tests for ${DISTRO}..."
      ./e2e/run-in-container.sh ${E2E_IMAGE_PREFIX}-${DISTRO} ${E2E_RESULTS}/${DISTRO}
  after_script:
    - |
      if [ -f "${E2E_RESULTS}/${DISTRO}/logs.json" ]; then
        echo "Log records captured:"
        jq -s '[.[].resourceLogs[]?.scopeLogs[]?.logRecords[]?] | length' \
          "${E2E_RESULTS}/${DISTRO}/logs.json" || echo "N/A"
      fi
  artifacts:
    when: always
    paths:
      - ${E2E_RESULTS}/${DISTRO}/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

e2e:fedora:
  <<: *e2e-base
  variables:
    DISTRO: fedora

e2e:al2023:
  <<: *e2e-base
  variables:
    DISTRO: al2023

e2e:debian:
  <<: *e2e-base
  variables:
    DISTRO: debian

# =============================================================================
# BUILD STAGE
# =============================================================================

build:release:
  stage: build
  image: messense/rust-musl-cross:x86_64-musl
  variables:
    CARGO_HOME: $CI_PROJECT_DIR/.cargo
    RUSTFLAGS: "-D warnings"
  cache:
    key: ${CI_COMMIT_REF_SLUG}-musl
    paths:
      - .cargo/
      - target/
  script:
    - rustup target add x86_64-unknown-linux-musl
    - cargo build --release --target x86_64-unknown-linux-musl
    - mkdir -p target/release
    - cp target/x86_64-unknown-linux-musl/release/${BINARY_NAME} target/release/${BINARY_NAME}
    - |
      # Use target-aware strip if available; fall back to host strip.
      if command -v x86_64-linux-musl-strip >/dev/null 2>&1; then
        x86_64-linux-musl-strip target/release/${BINARY_NAME}
      else
        strip target/release/${BINARY_NAME}
      fi
    - |
      echo "Binary info:"
      ls -lh target/release/${BINARY_NAME}
      file target/release/${BINARY_NAME}
    - |
      echo "Static linkage check:"
      file target/release/${BINARY_NAME} | grep -qE 'static|static-pie'
      # Fully static / static-pie binaries: ldd exits nonzero and wording varies
      # by ldd (glibc vs musl) and link style ("not a dynamic executable",
      # "statically linked", etc.). Accept any of those; fail only if ldd
      # reports real shared libs.
      set +e
      ldd target/release/${BINARY_NAME} > /tmp/ldd.out 2>&1
      LDD_RC=$?
      set -e
      cat /tmp/ldd.out
      if grep -qE 'not a dynamic executable|statically linked' /tmp/ldd.out; then
        echo "OK: static binary"
      elif [ "$LDD_RC" -ne 0 ] && ! grep -qE '\.so' /tmp/ldd.out; then
        echo "OK: ldd failed without shared libs (static-pie)"
      else
        echo "ERROR: binary appears dynamically linked"
        exit 1
      fi
  artifacts:
    paths:
      - target/release/${BINARY_NAME}
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# =============================================================================
# RELEASE STAGE
# =============================================================================

# Upload "latest" to GitLab Package Registry (main branch)
upload:gitlab:latest:
  stage: release
  image: curlimages/curl:latest
  dependencies:
    - build:release
  script:
    - |
      echo "Uploading ${BINARY_NAME} version 'latest' to GitLab..."
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "target/release/${BINARY_NAME}" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/latest/${BINARY_NAME}-linux-amd64"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Upload versioned release to GitLab Package Registry (tags only)
upload:gitlab:release:
  stage: release
  image: curlimages/curl:latest
  dependencies:
    - build:release
  script:
    - |
      echo "Uploading ${BINARY_NAME} version ${CI_COMMIT_TAG} to GitLab..."
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "target/release/${BINARY_NAME}" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${CI_COMMIT_TAG}/${BINARY_NAME}-linux-amd64"
  rules:
    - if: $CI_COMMIT_TAG

# Create GitLab Release (tags only)
release:gitlab:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  dependencies:
    - build:release
  script:
    - echo "Creating GitLab release for ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: |
      ## Release $CI_COMMIT_TAG

      ### Downloads
      - [Linux AMD64](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${CI_COMMIT_TAG}/${BINARY_NAME}-linux-amd64)

    assets:
      links:
        - name: "${BINARY_NAME}-linux-amd64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${CI_COMMIT_TAG}/${BINARY_NAME}-linux-amd64"
          link_type: package
  rules:
    - if: $CI_COMMIT_TAG

# Upload to GitHub Releases
# Requires: GITHUB_TOKEN variable with repo permissions
# Set in GitLab CI/CD Settings > Variables
upload:github:
  stage: release
  image: alpine:latest
  dependencies:
    - build:release
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      if [ -z "${GITHUB_TOKEN:-}" ]; then
        echo "GITHUB_TOKEN not set, skipping GitHub release"
        exit 0
      fi

      if [ -z "${GITHUB_REPO:-}" ]; then
        echo "GITHUB_REPO not set (e.g., 'owner/repo'), skipping GitHub release"
        exit 0
      fi

      VERSION="${CI_COMMIT_TAG}"
      if [ -z "${VERSION}" ]; then
        echo "Not a tag pipeline, skipping GitHub release"
        exit 0
      fi

      echo "Creating GitHub release ${VERSION}..."

      # Create release
      RELEASE_RESPONSE=$(curl -sf -X POST \
        -H "Authorization: token ${GITHUB_TOKEN}" \
        -H "Accept: application/vnd.github+json" \
        "https://api.github.com/repos/${GITHUB_REPO}/releases" \
        -d "{\"tag_name\":\"${VERSION}\",\"name\":\"Release ${VERSION}\",\"body\":\"## Release ${VERSION}\\n\\n### Downloads\\n- Linux AMD64\",\"prerelease\":false}")

      RELEASE_ID=$(echo "$RELEASE_RESPONSE" | jq .id)

      # Upload binary as release asset
      curl -sf -X POST \
        -H "Authorization: token ${GITHUB_TOKEN}" \
        -H "Content-Type: application/octet-stream" \
        --upload-file "target/release/${BINARY_NAME}" \
        "https://uploads.github.com/repos/${GITHUB_REPO}/releases/${RELEASE_ID}/assets?name=${BINARY_NAME}-linux-amd64"

      echo "GitHub release created successfully!"
  rules:
    - if: $CI_COMMIT_TAG